<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Teams pairing walkthrough</title>
  <desc id="desc">Illustrated Teams personal chat screenshot showing the initial hello message, pairing prompt, copied code, and connected state.</desc>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <rect x="55" y="42" width="1090" height="676" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="55" y="42" width="1090" height="68" rx="18" fill="#5b5fc7"/>
  <text x="90" y="84" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Microsoft Teams - Copilot CLI Teams Bridge</text>

  <rect x="90" y="140" width="290" height="520" rx="16" fill="#f8fafc" stroke="#d0d7de"/>
  <text x="120" y="185" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Chats</text>
  <rect x="110" y="215" width="250" height="72" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="132" y="246" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="bold" fill="#312e81">Copilot CLI Teams Bridge</text>
  <text x="132" y="273" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">Personal chat</text>

  <rect x="410" y="140" width="690" height="520" rx="16" fill="#f8fafc" stroke="#d0d7de"/>
  <text x="445" y="185" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#0f172a">Pairing flow</text>

  <rect x="450" y="230" width="230" height="58" rx="18" fill="#e2e8f0"/>
  <text x="478" y="266" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#0f172a">hello</text>

  <rect x="500" y="320" width="470" height="88" rx="18" fill="#5b5fc7"/>
  <text x="530" y="355" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">Check Copilot CLI for your pairing code.</text>
  <text x="530" y="385" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#e0e7ff">Reply here with the code to finish linking this chat.</text>

  <rect x="450" y="450" width="220" height="58" rx="18" fill="#e2e8f0"/>
  <text x="490" y="486" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#0f172a">a1b2c3</text>

  <rect x="500" y="540" width="410" height="78" rx="18" fill="#14b8a6"/>
  <text x="530" y="575" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Connected to Copilot CLI</text>
  <text x="530" y="604" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ccfbf1">You can now chat with the active CLI session from Teams.</text>

  <circle cx="980" cy="273" r="22" fill="#2563eb"/>
  <text x="973" y="281" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#ffffff">1</text>
  <text x="1015" y="268" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="bold" fill="#0f172a">Start here</text>
  <text x="1015" y="294" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#475569">Send any message to trigger pairing.</text>

  <circle cx="980" cy="478" r="22" fill="#0ea5e9"/>
  <text x="973" y="486" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#ffffff">2</text>
  <text x="1015" y="473" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="bold" fill="#0f172a">Reply with the code</text>
  <text x="1015" y="499" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#475569">Copy it from Copilot CLI and send it back here.</text>
</svg>
